name: Refresh Dashboard

permissions:
  contents: write

on:
  schedule:
    # Target "office" times in America/Chicago. GitHub Actions uses UTC only:
    # - Winter (CST): 9/12/4 PM local = 15:00 / 18:00 / 22:00 UTC (as below)
    # - Summer (CDT): same local clocks = 14:00 / 19:00 / 21:00 UTC — adjust crons when DST matters.
    - cron: '0 15 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Certificate auth on the runner: PEM cannot live in the repo. Store the full
      # private key (including -----BEGIN/END----- lines) in secret SHAREPOINT_CERT_PRIVATE_KEY_PEM.
      # This step writes it to a temp file and sets SHAREPOINT_CERT_PATH for the next step.
      - name: Prepare SharePoint certificate (optional)
        shell: bash
        env:
          PEM: ${{ secrets.SHAREPOINT_CERT_PRIVATE_KEY_PEM }}
        run: |
          if [ -n "${PEM}" ]; then
            printf '%s\n' "${PEM}" > "${RUNNER_TEMP}/sharepoint-cert.pem"
            chmod 600 "${RUNNER_TEMP}/sharepoint-cert.pem"
            echo "SHAREPOINT_CERT_PATH=${RUNNER_TEMP}/sharepoint-cert.pem" >> "${GITHUB_ENV}"
            echo "Wrote SharePoint app cert key to runner temp (thumbprint must match Azure upload)."
          else
            echo "No SHAREPOINT_CERT_PRIVATE_KEY_PEM; download_spreadsheet.py will use client secret only (if set)."
          fi

      - name: Download spreadsheet from SharePoint
        env:
          SHAREPOINT_CLIENT_ID: ${{ secrets.SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET: ${{ secrets.SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_CERT_PATH: ${{ env.SHAREPOINT_CERT_PATH }}
          SHAREPOINT_CERT_THUMBPRINT: ${{ secrets.SHAREPOINT_CERT_THUMBPRINT }}
          SHAREPOINT_TENANT_ID: ${{ secrets.SHAREPOINT_TENANT_ID }}
          SHAREPOINT_SITE_URL: ${{ secrets.SHAREPOINT_SITE_URL }}
          SHAREPOINT_FILE_PATHS: ${{ secrets.SHAREPOINT_FILE_PATHS }}
          SHAREPOINT_FILE_NAME: ${{ secrets.SHAREPOINT_FILE_NAME }}
        run: python download_spreadsheet.py

      - name: Rebuild dashboard
        env:
          DASHBOARD_UPLOAD_USER: ${{ secrets.DASHBOARD_UPLOAD_USER }}
          DASHBOARD_UPLOAD_PASSWORD: ${{ secrets.DASHBOARD_UPLOAD_PASSWORD }}
        run: python build_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to index.html"
            exit 0
          fi
          git commit -m "Dashboard refresh $(date +'%Y-%m-%d %H:%M')"
          ok=0
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" && git push && ok=1 && break
            echo "Push attempt $i failed; retrying in 25s…"
            sleep 25
          done
          if [ "$ok" != 1 ]; then
            echo "git push failed after 3 attempts"
            exit 1
          fi

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Dashboard refresh failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL" || true
          else
            echo "No SLACK_WEBHOOK_URL secret; skipping notification"
          fi
